version: "1"

name: GitHub CI Assembler

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

env:
  CI_ORCHESTRATOR: gh-ci-assembler
  GLOBAL_TIMEOUT: "600"

permissions:
  actions: read
  contents: read

stages:
  - build
  - notify
  - test
  - deploy
