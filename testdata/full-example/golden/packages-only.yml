name: GitHub CI Assembler
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - develop
defaults:
  run:
    shell: bash
env:
  CI_ORCHESTRATOR: gh-ci-assembler
  GLOBAL_TIMEOUT: "600"
permissions:
  actions: read
  checks: write
  contents: write
  id-token: write
  pull-requests: write
jobs:
  #  ── Stage: build ─────────────────────────────────────
  build--base--placeholder:
    name: placeholder - base [build]
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder
        run: echo "Base package placeholder"
  build--drupal--docker-nginx:
    name: docker-nginx - drupal [build]
    runs-on: ubuntu-latest
    env:
      PHP_VERSION: "8.2"
    steps:
      - uses: actions/checkout@v4
      - name: Build nginx configuration
        run: ./scripts/build-nginx.sh
  build--drupal--docker-php:
    name: Build PHP image - drupal [build]
    runs-on: ubuntu-latest
    env:
      PHP_VERSION: "8.2"
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
      - name: Install dependencies
        run: composer install --no-interaction
  build--redis--docker-redis:
    name: Build Redis image - redis [build]
    runs-on: self-hosted
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      REDIS_VERSION: "7"
    steps:
      - uses: actions/checkout@v4
      - name: Build Redis image
        run: docker build -t myapp-redis ./docker/redis
  #  ── Stage: notify ────────────────────────────────────
  notify--drupal--notify:
    name: notify - drupal [notify]
    needs: [build--base--placeholder, build--drupal--docker-nginx, build--drupal--docker-php, build--redis--docker-redis]
    runs-on: ubuntu-latest
    env:
      PHP_VERSION: "8.2"
    steps:
      - name: Notify Drupal build complete
        run: echo "Drupal build finished."
  notify--redis--notify:
    name: notify - redis [notify]
    needs: [build--base--placeholder, build--drupal--docker-nginx, build--drupal--docker-php, build--redis--docker-redis]
    runs-on: ubuntu-latest
    continue-on-error: true
    env:
      REDIS_VERSION: "7"
    steps:
      - name: Notify Redis build complete
        run: echo "Redis image built."
  #  ── Stage: test ──────────────────────────────────────
  test--drupal--phpunit:
    name: PHPUnit test suite - drupal [test]
    needs: [notify--drupal--notify, notify--redis--notify]
    runs-on: ubuntu-latest
    env:
      PHP_VERSION: "8.2"
    steps:
      - uses: actions/checkout@v4
      - name: Run PHPUnit
        run: vendor/bin/phpunit --coverage-text
  test--redis--job-test:
    name: job-test - redis [test]
    needs: [notify--drupal--notify, notify--redis--notify]
    runs-on: ubuntu-latest
    env:
      REDIS_VERSION: "7"
    steps:
      - uses: actions/checkout@v4
      - name: Run Redis integration tests
        run: ./run-tests.sh
  #  ── Stage: deploy ────────────────────────────────────
  deploy--redis--push-redis-image:
    name: push-redis-image - redis [deploy]
    needs: [test--drupal--phpunit, test--redis--job-test]
    runs-on: ubuntu-latest
    env:
      REDIS_VERSION: "7"
    steps:
      - uses: actions/checkout@v4
      - name: Push Redis image
        uses: docker/build-push-action@v5
        with:
          context: ./docker/redis
          push: "true"
          tags: ghcr.io/myorg/myapp-redis:latest
